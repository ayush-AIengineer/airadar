name: Refresh tool data

# Regenerates the public snapshot (frontend/public/data/tools.json) on a schedule and
# commits it. The commit triggers a Vercel redeploy, so the live site refreshes itself —
# fully free (GitHub Actions free minutes) and with no servers to keep running.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the pre-push rebase is reliable

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # Default dependency groups are enough for the offline pipeline (no LLM keys needed);
      # this avoids pulling the heavy crawl4ai/playwright/llm groups in CI.
      - name: Sync dependencies
        run: uv sync

      - name: Build DB and run the pipeline
        env:
          # The auto-provided Actions token raises GitHub's Search API limit (10→30/min),
          # which fixes the unauthenticated 403 on CI runners. No secret to configure.
          AIRADAR_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run alembic upgrade head
          uv run airadar seed-sources
          # A single flaky source must not abort the whole refresh.
          uv run airadar pipeline-once --source hackernews --lookback-hours 96 --limit 50 || echo "::warning::hackernews source failed"
          uv run airadar pipeline-once --source github --lookback-hours 168 --limit 50 || echo "::warning::github source failed"

      - name: Export public snapshot
        run: uv run python scripts/export_tools_json.py

      - name: Commit snapshot if it changed (and is non-empty)
        run: |
          COUNT=$(uv run python -c "import json; print(json.load(open('frontend/public/data/tools.json'))['count'])")
          echo "Snapshot has $COUNT tools."
          if [ "$COUNT" -lt 3 ]; then
            echo "Too few tools ($COUNT) — keeping the previous snapshot to avoid publishing an empty feed."
            exit 0
          fi
          git config user.name "airadar-bot"
          git config user.email "bot@users.noreply.github.com"
          if git diff --quiet -- frontend/public/data/tools.json; then
            echo "No data changes — skipping commit."
          else
            git add frontend/public/data/tools.json
            git commit -m "chore(data): refresh tool snapshot"
            # Rebase onto any commits that landed since checkout, then push (avoids races).
            git pull --rebase origin main
            git push origin HEAD:main
          fi
